<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Bingo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        * { box-sizing: border-box; }

        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --green: #2ecc71;
            --red: #e74c3c;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden; 
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, #222, #000);
            border-bottom: 2px solid var(--gold);
            margin-bottom: 15px;
        }

        h1 { color: var(--gold); margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .menu-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .menu-btn {
            background: #222;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .menu-btn.active {
            background: var(--gold);
            color: #000;
        }

        #error-msg {
            color: var(--red);
            font-size: 0.8rem;
            height: 1rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 450px;
            padding: 10px;
            margin: 0 auto;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--dark);
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
            position: relative;
        }

        .cell input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            text-align: center;
            font-size: 18px; 
            outline: none;
            opacity: 1; 
        }

        /* Markierung für doppelte Zahlen */
        .cell.duplicate {
            border: 2px solid var(--red);
            background: rgba(231, 76, 60, 0.2);
        }

        .cell.marked {
            background-color: var(--green) !important;
            border-color: #fff;
        }

        .cell.marked input {
            color: #000;
            font-weight: bold;
        }

        #bingo-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--gold);
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 0 0 20px var(--gold);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #bingo-overlay button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: var(--gold);
            border: none;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            border-radius: 5px;
        }

        #caller-view {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #000;
            z-index: 200;
            text-align: center;
            padding: 20px;
            overflow-y: auto;
        }

        .big-number {
            font-size: clamp(5rem, 20vw, 12rem);
            color: var(--gold);
            margin: 20px 0;
            min-height: 12rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .history-ball {
            width: 45px; height: 45px;
            background: #222;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--gold);
        }

        .admin-link {
            margin-top: auto;
            margin-bottom: 20px;
            color: #444;
            font-size: 0.8rem;
            text-decoration: none;
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="main-view" style="display: flex; flex-direction: column; align-items: center; width: 100%; flex-grow: 1;">
    <header><h1>Casino Bingo</h1></header>

    <div class="menu-bar">
        <button id="btn-edit" class="menu-btn active" onclick="setMode('edit')">Eingabe</button>
        <button id="btn-play" class="menu-btn" onclick="setMode('play')">Werten</button>
    </div>

    <div id="error-msg"></div>

    <div class="grid" id="bingo-grid"></div>

    <a href="#" class="admin-link" onclick="showCaller()">Admin / Beamer Ansicht</a>
</div>

<div id="bingo-overlay">
    BINGO!
    <button onclick="closeBingo()">Weiter</button>
</div>

<div id="caller-view">
    <h1 style="color: var(--gold);">Zahlen ziehen</h1>
    <div class="big-number" id="current-number">--</div>
    <button class="menu-btn" style="font-size: 1.5rem; padding: 15px 30px;" onclick="drawNumber()">Nächste Zahl</button>
    <p style="color: var(--gold); margin-top: 30px;">Gezogen:</p>
    <div class="history" id="number-history"></div>
    <br><br>
    <button class="menu-btn" onclick="location.reload()">Zurück zum Spiel</button>
</div>
